services:
  db:
    image: postgres:16
    container_name: parkclub_db
    restart: always
    environment:
      POSTGRES_DB: residencialparkclub
      POSTGRES_USER: enterprise_user
      POSTGRES_PASSWORD: "#otopodomundo2025"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  web:
    build: .
    container_name: parkclub_web
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: parkclub.settings_prod
      SECRET_KEY: "pk-s3cr3t-k3y-r3s1d3nc14l-p4rk-club-2026-pr0duc40"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: residencialparkclub
      DB_USER: enterprise_user
      DB_PASSWORD: "#otopodomundo2025"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      - db
    networks:
      - backend

# NOTA: O nginx e certbot foram movidos para o proxy compartilhado em /opt/proxy/
# Isso evita conflitos de porta 80/443 com outros projetos no mesmo servidor.
# Para subir/parar o proxy: cd /opt/proxy && docker compose up -d

volumes:
  pgdata:
  static_files:
  media_files:
  certbot_www:
  certbot_certs:

networks:
  backend:
