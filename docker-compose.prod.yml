services:
  db:
    image: postgres:16
    container_name: parkclub_db
    restart: always
    environment:
      POSTGRES_DB: residencialparkclub
      POSTGRES_USER: enterprise_user
      POSTGRES_PASSWORD: "#otopodomundo2025"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  web:
    build: .
    container_name: parkclub_web
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: parkclub.settings_prod
      SECRET_KEY: "pk-s3cr3t-k3y-r3s1d3nc14l-p4rk-club-2026-pr0duc40"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: residencialparkclub
      DB_USER: enterprise_user
      DB_PASSWORD: "#otopodomundo2025"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      - db
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: parkclub_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-initial.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - backend

  certbot:
    image: certbot/certbot
    container_name: parkclub_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  static_files:
  media_files:
  certbot_www:
  certbot_certs:

networks:
  backend:
